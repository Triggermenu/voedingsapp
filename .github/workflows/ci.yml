name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Validate database
        run: npm run validate-db

      - name: Check source URLs
        run: npm run check-sources
        timeout-minutes: 5

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e -- --project=chromium

  # Auto-merge gate: draait UITSLUITEND als de `ci`-job (alle 16 gates) is geslaagd
  # — `needs: ci`. Vervangt branch protection (niet beschikbaar zonder repo-admin):
  # een PR van een trusted author merget pas ná groene CI. CLAUDE.md §4.6.
  auto-merge:
    needs: ci
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Squash-merge bij trusted author (CI is groen)
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if jq -e --arg a "$PR_AUTHOR" '.authors | index($a)' trusted-authors.json > /dev/null; then
            echo "✓ $PR_AUTHOR is trusted en CI is groen — squash-merge."
            gh pr merge --squash --delete-branch "$PR_NUMBER"
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ $PR_AUTHOR niet in trusted-authors.json — handmatige merge vereist."
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      # Deploy de zojuist gemergede main direct naar productie. Nodig omdat een
      # GITHUB_TOKEN-merge geen push-workflows (deploy.yml) triggert; zo blijft
      # "gemerged" == "live" zonder PAT — met de Vercel-secrets die al bestaan.
      - name: Deploy naar Vercel (productie) na merge
        if: steps.merge.outputs.merged == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          git fetch origin main
          git checkout -f FETCH_HEAD
          npm ci
          npx vercel deploy --prod --token="$VERCEL_TOKEN" --yes
